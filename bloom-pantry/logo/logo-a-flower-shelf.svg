<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Bloom Pantry — Logo A: Flower + Pantry Shelf -->

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#d5dcd1"/>

  <!-- Pantry shelf -->
  <rect x="40" y="130" width="120" height="40" rx="4" fill="#6d9c90"/>
  <!-- shelf ledge -->
  <rect x="34" y="166" width="132" height="7" rx="3" fill="#2f3e46"/>

  <!-- Jars on shelf -->
  <rect x="46"  y="138" width="16" height="28" rx="3" fill="#9fbca5"/>
  <rect x="68"  y="142" width="14" height="24" rx="3" fill="#496bbf"/>
  <rect x="88"  y="136" width="18" height="30" rx="4" fill="#9fbca5"/>
  <rect x="112" y="140" width="15" height="26" rx="3" fill="#6d9c90"/>
  <rect x="133" y="138" width="14" height="28" rx="3" fill="#496bbf"/>

  <!-- Stem -->
  <line x1="100" y1="110" x2="100" y2="132" stroke="#2f3e46" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="89"  cy="122" rx="12" ry="5.5" fill="#6d9c90" transform="rotate(-35 89 122)"/>
  <ellipse cx="111" cy="125" rx="12" ry="5.5" fill="#6d9c90" transform="rotate(35 111 125)"/>

  <!-- Petals (outer) -->
  <ellipse cx="100" cy="82" rx="10" ry="22" fill="#9fbca5"/>
  <ellipse cx="100" cy="82" rx="10" ry="22" fill="#9fbca5" transform="rotate(45 100 82)"/>
  <ellipse cx="100" cy="82" rx="10" ry="22" fill="#9fbca5" transform="rotate(90 100 82)"/>
  <ellipse cx="100" cy="82" rx="10" ry="22" fill="#9fbca5" transform="rotate(135 100 82)"/>
  <!-- Petals (inner) -->
  <ellipse cx="100" cy="82" rx="7" ry="15" fill="#6d9c90" transform="rotate(22.5 100 82)"/>
  <ellipse cx="100" cy="82" rx="7" ry="15" fill="#6d9c90" transform="rotate(67.5 100 82)"/>
  <ellipse cx="100" cy="82" rx="7" ry="15" fill="#6d9c90" transform="rotate(112.5 100 82)"/>
  <ellipse cx="100" cy="82" rx="7" ry="15" fill="#6d9c90" transform="rotate(157.5 100 82)"/>
  <!-- Flower centre -->
  <circle cx="100" cy="82" r="13" fill="#2f3e46"/>
  <circle cx="100" cy="82" r="7"  fill="#496bbf"/>
  <circle cx="100" cy="82" r="3"  fill="#d5dcd1"/>
</svg>
